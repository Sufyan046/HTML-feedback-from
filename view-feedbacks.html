<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Feedbacks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }

        .filters {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filters label {
            font-weight: 600;
            color: #333;
        }

        .filters select,
        .filters input {
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .filters select:focus,
        .filters input:focus {
            outline: none;
            border-color: #667eea;
        }

        .no-feedbacks {
            background: white;
            padding: 60px 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .no-feedbacks p {
            color: #999;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .feedbacks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .feedback-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            border-left: 4px solid #667eea;
        }

        .feedback-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .feedback-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .feedback-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .feedback-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-category {
            background: #e3f2fd;
            color: #1976d2;
        }

        .badge-rating-1 {
            background: #ffebee;
            color: #c62828;
        }

        .badge-rating-2 {
            background: #fff3e0;
            color: #e65100;
        }

        .badge-rating-3 {
            background: #f1f8e9;
            color: #558b2f;
        }

        .badge-rating-4 {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .feedback-info {
            font-size: 13px;
            color: #999;
            margin-bottom: 12px;
        }

        .feedback-message {
            color: #555;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 12px;
            max-height: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .feedback-aspects {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
            font-size: 12px;
        }

        .aspect-tag {
            background: #f5f5f5;
            color: #666;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .feedback-footer {
            display: flex;
            gap: 10px;
            padding-top: 12px;
            border-top: 1px solid #f0f0f0;
        }

        .btn-sm {
            flex: 1;
            padding: 8px 12px;
            font-size: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-view {
            background: #667eea;
            color: white;
        }

        .btn-view:hover {
            background: #5568d3;
        }

        .btn-delete {
            background: #f5f5f5;
            color: #e74c3c;
            border: 1px solid #f0f0f0;
        }

        .btn-delete:hover {
            background: #ffe5e5;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .modal-header h2 {
            color: #333;
            font-size: 24px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: #333;
        }

        .detail-row {
            margin-bottom: 20px;
        }

        .detail-label {
            font-weight: 600;
            color: #666;
            font-size: 13px;
            text-transform: uppercase;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .detail-value {
            color: #333;
            font-size: 15px;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .feedbacks-grid {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                align-items: start;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .filters {
                flex-direction: column;
                align-items: start;
            }

            .filters > * {
                width: 100%;
            }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>📊 Feedback Dashboard</h1>
            </div>
            <div class="header-actions">
                <a href="feedback-form.html" class="btn btn-primary">+ New Feedback</a>
                <button class="btn btn-secondary" onclick="exportFeedbacks()">⬇ Export</button>
                <button class="btn btn-danger" onclick="clearAllFeedbacks()">🗑 Clear All</button>
            </div>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <h3>Total Feedbacks</h3>
                <div class="value" id="totalCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Average Rating</h3>
                <div class="value" id="avgRating">0</div>
            </div>
            <div class="stat-card">
                <h3>Excellent (4★)</h3>
                <div class="value" id="excellentCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Follow-ups</h3>
                <div class="value" id="followupCount">0</div>
            </div>
        </div>

        <div class="filters">
            <label for="categoryFilter">Category:</label>
            <select id="categoryFilter" onchange="filterFeedbacks()">
                <option value="">All Categories</option>
                <option value="bug">Bug Report</option>
                <option value="feature">Feature Request</option>
                <option value="improvement">Improvement Suggestion</option>
                <option value="complaint">Complaint</option>
                <option value="compliment">Compliment</option>
                <option value="other">Other</option>
            </select>

            <label for="ratingFilter" style="margin-left: 20px;">Rating:</label>
            <select id="ratingFilter" onchange="filterFeedbacks()">
                <option value="">All Ratings</option>
                <option value="4">Excellent (4★)</option>
                <option value="3">Good (3★)</option>
                <option value="2">Fair (2★)</option>
                <option value="1">Poor (1★)</option>
            </select>

            <input type="text" id="searchInput" placeholder="Search by name, email, subject..." style="margin-left: 20px; flex: 1; min-width: 200px;" onkeyup="filterFeedbacks()">
        </div>

        <div class="feedbacks-grid" id="feedbacksContainer">
            <div class="no-feedbacks">
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>No feedbacks yet. <a href="feedback-form.html" style="color: #667eea; text-decoration: none; font-weight: 600;">Create one →</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for viewing full feedback -->
    <div class="modal" id="feedbackModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Feedback Details</h2>
                <button class="modal-close" onclick="closeFeedbackModal()">×</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let allFeedbacks = [];

        // Load feedbacks on page load
        function loadFeedbacks() {
            allFeedbacks = JSON.parse(localStorage.getItem('feedbacks')) || [];
            displayFeedbacks(allFeedbacks);
            updateStats();
        }

        function displayFeedbacks(feedbacks) {
            const container = document.getElementById('feedbacksContainer');

            if (feedbacks.length === 0) {
                container.innerHTML = `
                    <div class="no-feedbacks" style="grid-column: 1/-1;">
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>No feedbacks yet. <a href="feedback-form.html" style="color: #667eea; text-decoration: none; font-weight: 600;">Create one →</a></p>
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = feedbacks.map(feedback => {
                const ratingEmojis = ['😞', '😐', '🙂', '😊'];
                const ratingEmoji = ratingEmojis[feedback.rating - 1] || '';
                const categoryColors = {
                    bug: '#ff6b6b',
                    feature: '#4ecdc4',
                    improvement: '#45b7d1',
                    complaint: '#f06292',
                    compliment: '#26a69a'
                };

                return `
                    <div class="feedback-card">
                        <div class="feedback-header">
                            <div>
                                <div class="feedback-title">${escapeHtml(feedback.subject)}</div>
                                <div class="feedback-info">${escapeHtml(feedback.name)} • ${feedback.timestamp}</div>
                            </div>
                        </div>

                        <div class="feedback-meta">
                            <span class="badge badge-category">${feedback.category}</span>
                            <span class="badge badge-rating-${feedback.rating}">${ratingEmoji} Rating: ${feedback.rating}/4</span>
                        </div>

                        ${feedback.aspects.length > 0 ? `
                            <div class="feedback-aspects">
                                ${feedback.aspects.map(aspect => `<span class="aspect-tag">${aspect}</span>`).join('')}
                            </div>
                        ` : ''}

                        <div class="feedback-message">${escapeHtml(feedback.message)}</div>

                        ${feedback.followup ? '<div style="color: #667eea; font-size: 12px; padding: 8px; background: #f0f3ff; border-radius: 6px; margin-bottom: 10px;">✓ Follow-up requested</div>' : ''}

                        <div class="feedback-footer">
                            <button class="btn-sm btn-view" onclick="viewFeedback(${feedback.id})">View Details</button>
                            <button class="btn-sm btn-delete" onclick="deleteFeedback(${feedback.id})">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterFeedbacks() {
            const categoryFilter = document.getElementById('categoryFilter').value;
            const ratingFilter = document.getElementById('ratingFilter').value;
            const searchInput = document.getElementById('searchInput').value.toLowerCase();

            const filtered = allFeedbacks.filter(feedback => {
                const categoryMatch = !categoryFilter || feedback.category === categoryFilter;
                const ratingMatch = !ratingFilter || feedback.rating.toString() === ratingFilter;
                const searchMatch = !searchInput || 
                    feedback.name.toLowerCase().includes(searchInput) ||
                    feedback.email.toLowerCase().includes(searchInput) ||
                    feedback.subject.toLowerCase().includes(searchInput) ||
                    feedback.message.toLowerCase().includes(searchInput);

                return categoryMatch && ratingMatch && searchMatch;
            });

            displayFeedbacks(filtered);
        }

        function updateStats() {
            const totalCount = allFeedbacks.length;
            const avgRating = totalCount > 0 
                ? (allFeedbacks.reduce((sum, f) => sum + parseInt(f.rating), 0) / totalCount).toFixed(1)
                : 0;
            const excellentCount = allFeedbacks.filter(f => f.rating == 4).length;
            const followupCount = allFeedbacks.filter(f => f.followup).length;

            document.getElementById('totalCount').textContent = totalCount;
            document.getElementById('avgRating').textContent = avgRating;
            document.getElementById('excellentCount').textContent = excellentCount;
            document.getElementById('followupCount').textContent = followupCount;
        }

        function viewFeedback(id) {
            const feedback = allFeedbacks.find(f => f.id === id);
            if (!feedback) return;

            const ratingEmojis = ['😞', '😐', '🙂', '😊'];
            const modalBody = document.getElementById('modalBody');

            modalBody.innerHTML = `
                <div class="detail-row">
                    <div class="detail-label">Name</div>
                    <div class="detail-value">${escapeHtml(feedback.name)}</div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Email</div>
                    <div class="detail-value">${escapeHtml(feedback.email)}</div>
                </div>

                ${feedback.phone ? `
                    <div class="detail-row">
                        <div class="detail-label">Phone</div>
                        <div class="detail-value">${escapeHtml(feedback.phone)}</div>
                    </div>
                ` : ''}

                <div class="detail-row">
                    <div class="detail-label">Subject</div>
                    <div class="detail-value">${escapeHtml(feedback.subject)}</div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Category</div>
                    <div class="detail-value">${feedback.category}</div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Rating</div>
                    <div class="detail-value">${ratingEmojis[feedback.rating - 1]} ${feedback.rating}/4 - Rating</div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Message</div>
                    <div class="detail-value">${escapeHtml(feedback.message)}</div>
                </div>

                ${feedback.aspects.length > 0 ? `
                    <div class="detail-row">
                        <div class="detail-label">Improvement Areas</div>
                        <div class="detail-value">${feedback.aspects.join(', ')}</div>
                    </div>
                ` : ''}

                <div class="detail-row">
                    <div class="detail-label">Follow-up Contact</div>
                    <div class="detail-value">${feedback.followup ? '✓ Yes' : '✗ No'}</div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Submitted</div>
                    <div class="detail-value">${feedback.timestamp}</div>
                </div>
            `;

            document.getElementById('feedbackModal').classList.add('active');
        }

        function closeFeedbackModal() {
            document.getElementById('feedbackModal').classList.remove('active');
        }

        function deleteFeedback(id) {
            if (confirm('Are you sure you want to delete this feedback?')) {
                allFeedbacks = allFeedbacks.filter(f => f.id !== id);
                localStorage.setItem('feedbacks', JSON.stringify(allFeedbacks));
                displayFeedbacks(allFeedbacks);
                updateStats();
            }
        }

        function clearAllFeedbacks() {
            if (confirm('Are you sure you want to delete ALL feedbacks? This cannot be undone.')) {
                allFeedbacks = [];
                localStorage.setItem('feedbacks', JSON.stringify(allFeedbacks));
                displayFeedbacks(allFeedbacks);
                updateStats();
            }
        }

        function exportFeedbacks() {
            if (allFeedbacks.length === 0) {
                alert('No feedbacks to export');
                return;
            }

            const csv = convertToCSV(allFeedbacks);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `feedbacks-${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }

        function convertToCSV(feedbacks) {
            const headers = ['ID', 'Name', 'Email', 'Phone', 'Subject', 'Category', 'Message', 'Rating', 'Aspects', 'Follow-up', 'Timestamp'];
            const csv = [headers.join(',')];

            feedbacks.forEach(feedback => {
                const row = [
                    feedback.id,
                    `"${feedback.name.replace(/"/g, '""')}"`,
                    `"${feedback.email}"`,
                    `"${feedback.phone || ''}"`,
                    `"${feedback.subject.replace(/"/g, '""')}"`,
                    feedback.category,
                    `"${feedback.message.replace(/"/g, '""')}"`,
                    feedback.rating,
                    `"${feedback.aspects.join('; ')}"`,
                    feedback.followup ? 'Yes' : 'No',
                    `"${feedback.timestamp}"`
                ];
                csv.push(row.join(','));
            });

            return csv.join('\n');
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Close modal when clicking outside
        document.getElementById('feedbackModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeFeedbackModal();
            }
        });

        // Load feedbacks on page load
        loadFeedbacks();

        // Refresh every 5 seconds to show new feedbacks
        setInterval(loadFeedbacks, 5000);
    </script>
</body>
</html>
